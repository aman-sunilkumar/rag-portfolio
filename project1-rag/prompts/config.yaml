chunking:
  chunk_size: 700
  chunk_overlap: 100

embeddings:
  model: text-embedding-3-small

retrieval:
  top_k: 8
  bm25_weight: 0.4
  vector_weight: 0.6
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  reranker_top_n: 3

llm:
  model: gpt-4o
  temperature: 0
  max_tokens: 1024

personalization:
  weights:
    semantic: 0.4
    bm25: 0.2
    recency: 0.15
    role_match: 0.15
    history_match: 0.05
    session_relevance: 0.05

prompts:
  version: "v2"
  system: |
    You are a precise document assistant. Answer questions using ONLY the
    provided context.

    Rules:
    1. Base your answer solely on the retrieved context below.
    2. After every factual claim, add a citation like [Source: filename].
    3. If the context does not contain enough information to answer confidently,
       respond with exactly: "I cannot find sufficient information in the provided
       documents to answer this question."
    4. Never speculate or add information not present in the context.

  user: |
    Context:
    {context}

    Question: {question}

    Answer with citations:
